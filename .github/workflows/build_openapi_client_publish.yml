name: "🧰 📦 Build & Publish OpenAPI Python Client"

on:
  workflow_call:
    inputs:
      repository_owner_override:
        description: 'Override OWNER part of pypi.pkg.github.com/<OWNER> (defaults to repository owner)'
        required: false
        type: string
      upload_when:
        description: 'When to publish: tags|always|never (default: tags)'
        required: false
        type: string
        default: 'tags'
      registry_scope:
        description: 'Registry path scope: owner (default) or repo (owner/repo)'
        required: false
        type: string
        default: 'owner'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    name: "🧰 Build client and publish to GitHub Packages"
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Print all env variable values
        run: env | sort

      - name: Setup Python Project
        uses: sidkos/metadata_server/.github/actions/setup_python_project@add-client-buid

      - name: Build OpenAPI client (using repo script)
        run: |
          chmod +x ./scripts/build_open_api_client.sh
          ./scripts/build_open_api_client.sh

      - name: Show built artifacts
        run: |
          ls -lah metadata-client/dist || true

      - name: Upload artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: metadata-client-dist
          path: metadata-client/dist/*

      - name: Resolve OWNER/REPO, VERSION, and REPO_URL
        id: meta
        run: |
          OWNER_INPUT="${{ inputs.repository_owner_override }}"
          OWNER=${OWNER_INPUT:-${{ github.repository_owner }}}
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"

          # Derive repo name from <owner>/<repo>
          REPO_FULL='${{ github.repository }}'
          REPO=${REPO_FULL#*/}
          REPO_LC=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          echo "repo_lc=$REPO_LC" >> "$GITHUB_OUTPUT"

          # Compute registry URL based on selected scope
          SCOPE='${{ inputs.registry_scope }}'
          if [[ "$SCOPE" == "repo" ]]; then
            REPO_URL="https://pypi.pkg.github.com/${OWNER_LC}/${REPO_LC}/"
          else
            REPO_URL="https://pypi.pkg.github.com/${OWNER_LC}/"
          fi
          echo "repo_url=$REPO_URL" >> "$GITHUB_OUTPUT"

          VERSION=$(python setup.py --version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"
          echo "Using registry scope: $SCOPE"
          echo "Resolved upload URL: $REPO_URL"

      - name: Install Twine
        run: python -m pip install --upgrade twine

      - name: Delete existing package version in GitHub Packages (if any)
        env:
          OWNER: ${{ steps.meta.outputs.owner_lc }}
          TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
        run: |
          set -euo pipefail
          PACKAGE="metadata-client"
          VERSION="${{ steps.meta.outputs.version }}"
          API_VER="2022-11-28"
          HDRS=("-H" "Authorization: Bearer $TOKEN" "-H" "Accept: application/vnd.github+json" "-H" "X-GitHub-Api-Version: $API_VER")

          get_versions() {
            # Try org endpoint first, then user endpoint
            curl -fsS "https://api.github.com/orgs/$OWNER/packages/python/$PACKAGE/versions?per_page=100" "${HDRS[@]}" || \
            curl -fsS "https://api.github.com/users/$OWNER/packages/python/$PACKAGE/versions?per_page=100" "${HDRS[@]}"
          }

          VID=$(get_versions | jq -r --arg V "$VERSION" '.[] | select(.name==$V) | .id' | head -n1 || true)
          if [[ -n "${VID:-}" ]]; then
            echo "Found existing package version id: $VID for $PACKAGE@$VERSION. Deleting..."
            # Try org delete, then user delete
            curl -fsS -X DELETE "https://api.github.com/orgs/$OWNER/packages/python/$PACKAGE/versions/$VID" "${HDRS[@]}" || \
            curl -fsS -X DELETE "https://api.github.com/users/$OWNER/packages/python/$PACKAGE/versions/$VID" "${HDRS[@]}"
            echo "Deleted existing version $VERSION."
          else
            echo "No existing version $VERSION found for $PACKAGE; proceeding."
          fi

      - name: Publish to GitHub Packages (always)
        env:
          TWINE_USERNAME: ${{ secrets.PACKAGES_USERNAME || steps.meta.outputs.owner_lc }}
          TWINE_PASSWORD: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
          REPO_URL: ${{ steps.meta.outputs.repo_url }}
        run: |
          echo "Uploading to: $REPO_URL/metadata_server"
          python -m twine upload \
            --repository-url https://pypi.pkg.github.com/sidkos/metadata_server   \
            metadata-client/dist/*
